aid: kestrel
url: >-
  https://raw.githubusercontent.com/api-evangelist/kestrel/refs/heads/main/apis.yml
apis:
  - aid: kestrel:platform
    name: Kestrel Platform
    tags:
      - AI Agents
      - Cloud Security
      - Incident Response
      - Kubernetes
    humanURL: https://docs.usekestrel.ai/
    properties:
      - url: https://docs.usekestrel.ai/
        type: Documentation
      - url: https://docs.usekestrel.ai/quickstart
        type: GettingStarted
      - url: https://platform.usekestrel.ai/register
        type: SignUp
    description: >-
      Kestrel AI provides an AI-native cloud incident response platform that
      uses autonomous agents to detect, investigate, and remediate Kubernetes
      and cloud infrastructure incidents. The platform monitors clusters
      continuously, identifies root causes, and generates production-ready
      fixes delivered as pull requests via GitOps workflows. It integrates
      with major cloud providers, observability tools, and CI/CD platforms
      to provide end-to-end incident management.
  - aid: kestrel:kubernetes-operator
    name: Kestrel Kubernetes Operator
    tags:
      - gRPC
      - Helm
      - Kubernetes
      - Operators
    humanURL: https://docs.usekestrel.ai/kubernetes/configuration
    properties:
      - url: https://docs.usekestrel.ai/kubernetes/configuration
        type: Documentation
      - url: https://github.com/KestrelAI/Kestrel-Operator
        type: GitHubOrganization
    description: >-
      The Kestrel Kubernetes Operator is an open-source Go-based operator
      that connects Kubernetes clusters to the Kestrel AI platform. It
      communicates via bidirectional gRPC streaming over mTLS with OAuth2
      authentication, streaming resource metadata, logs, events, and network
      telemetry. The operator supports OpenTelemetry OTLP ingestion and
      Istio Access Log Service integration for comprehensive observability.
      It is deployed via Helm chart from the GitHub Container Registry.
